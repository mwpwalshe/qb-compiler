name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,ising]"
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,ising]"
      - name: mypy
        run: mypy src/qb_compiler/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        qiskit-version: ["1.4", "2.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,ising]"
      - name: Pin Qiskit ${{ matrix.qiskit-version }}
        run: pip install "qiskit~=${{ matrix.qiskit-version }}.0"
      - name: Run tests
        run: |
          pytest tests/unit -v \
            --timeout=30 \
            --cov=src/qb_compiler \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.qiskit-version == '2.0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
