name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/qb_compiler/

      - name: Run tests
        run: |
          pytest tests/unit -v \
            --timeout=30 \
            --cov=src/qb_compiler \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build hatchling hatch-vcs

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify version from tag
        run: |
          WHEEL=$(ls dist/*.whl)
          echo "Built: $WHEEL"
          TAG_VERSION=${GITHUB_REF_NAME#v}
          echo "Tag version: $TAG_VERSION"
          if [[ "$WHEEL" != *"$TAG_VERSION"* ]]; then
            echo "ERROR: Wheel version does not match tag version"
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install bandit[toml] pip-audit

      - name: Run bandit
        run: bandit -r src/qb_compiler/ -c pyproject.toml --severity-level medium || true

      - name: Install package for audit
        run: pip install -e "."

      - name: Run pip-audit
        run: pip-audit --strict --desc || true

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e "."

      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment > sbom.json || echo '{}' > sbom.json

      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi, sbom]
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            sbom/sbom.json
          fail_on_unmatched_files: false

  verify:
    name: Verify PyPI install (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: publish-pypi
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for PyPI propagation
        run: sleep 120

      - name: Install from PyPI
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          for i in 1 2 3; do
            pip install "qb-compiler==$TAG_VERSION" && break
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done

      - name: Verify import
        run: python -c "import qb_compiler; print('qb-compiler installed successfully')"

      - name: Verify CLI
        run: qbc --version
