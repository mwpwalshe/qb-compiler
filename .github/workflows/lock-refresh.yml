name: Lock File Refresh

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  lock-refresh:
    name: Refresh dependency lock files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Compile lock files
        run: |
          pip-compile pyproject.toml \
            --output-file requirements-lock.txt \
            --strip-extras \
            --generate-hashes
          pip-compile pyproject.toml \
            --extra dev \
            --output-file requirements-dev-lock.txt \
            --strip-extras \
            --generate-hashes

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh dependency lock files"
          title: "chore: weekly dependency lock refresh"
          body: |
            Automated weekly refresh of dependency lock files.

            - `requirements-lock.txt` — production dependencies
            - `requirements-dev-lock.txt` — development dependencies

            Generated by `pip-compile` from `pyproject.toml`.
          branch: chore/lock-refresh
          labels: dependencies
          delete-branch: true
